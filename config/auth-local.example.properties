# Local authentication config. Copy to config/auth-local.properties and fill values for your machine.
APP_BASE_URL=http://localhost:9999/CarRentalSystem

# Local development helper. When true and SMTP is missing, verification/reset codes are shown on screen.
AUTH_DEV_MODE=true

# SMTP email sending. Gmail requires an app password, not your normal Gmail password.
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587
SMTP_USERNAME=your_email@gmail.com
SMTP_PASSWORD=your_email_app_password
SMTP_FROM=your_email@gmail.com
SMTP_STARTTLS=true
SMTP_SSL=false

# Google OAuth callback: ${APP_BASE_URL}/oauth/google/callback
GOOGLE_CLIENT_ID=your_google_client_id
GOOGLE_CLIENT_SECRET=your_google_client_secret

# Facebook OAuth callback: ${APP_BASE_URL}/oauth/facebook/callback
FACEBOOK_CLIENT_ID=your_facebook_app_id
FACEBOOK_CLIENT_SECRET=your_facebook_app_secret
FACEBOOK_GRAPH_VERSION=v25.0
